<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 72" width="100%" role="img" aria-label="MY STATS">

<defs>
  <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0a1b2b"/>
    <stop offset="50%" stop-color="#0a0a1f"/>
    <stop offset="100%" stop-color="#160a2b"/>
  </linearGradient>
  <linearGradient id="htxt" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#3fe9ff"/>
    <stop offset="50%" stop-color="#7aa6ff"/>
    <stop offset="100%" stop-color="#f49bdd"/>
  </linearGradient>
  <linearGradient id="brd" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#3fe9ff" stop-opacity="0.6"/>
    <stop offset="50%" stop-color="#8DBDFF" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#c77dff" stop-opacity="0.6"/>
  </linearGradient>
  <linearGradient id="lineL" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#3fe9ff" stop-opacity="0"/>
    <stop offset="100%" stop-color="#3fe9ff" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="lineR" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#c77dff" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#c77dff" stop-opacity="0"/>
  </linearGradient>
  <filter id="hglow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="dglow" x="-300%" y="-300%" width="700%" height="700%">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
</defs>

<rect x="2" y="2" width="1196" height="68" rx="14" fill="url(#bar)" stroke="url(#brd)" stroke-width="1.5"/>
<path d="M 18 14 H 6 V 26" fill="none" stroke="#3fe9ff" stroke-width="2" stroke-opacity="0.7"/>
<path d="M 1182 58 H 1194 V 46" fill="none" stroke="#c77dff" stroke-width="2" stroke-opacity="0.7"/>
<line x1="70" y1="36.0" x2="495.0" y2="36.0" stroke="url(#lineL)" stroke-width="2.5"/>
<line x1="705.0" y1="36.0" x2="1130" y2="36.0" stroke="url(#lineR)" stroke-width="2.5"/>
<circle cy="36.0" r="3.2" fill="#3fe9ff" filter="url(#dglow)">
      <animate attributeName="cx" values="70;495.0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/></circle>
<circle cy="36.0" r="3.2" fill="#e6b8ff" filter="url(#dglow)">
      <animate attributeName="cx" values="1130;705.0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/></circle>
<rect x="491.0" y="32.0" width="8" height="8" fill="#3fe9ff" transform="rotate(45 495.0 36.0)"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></rect>
<rect x="701.0" y="32.0" width="8" height="8" fill="#e6b8ff" transform="rotate(45 705.0 36.0)"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></rect>
<text x="600.0" y="37.0" text-anchor="middle" dominant-baseline="central"
      font-family="'Trebuchet MS', Verdana, sans-serif" font-size="25" font-weight="bold"
      letter-spacing="5" word-spacing="10" fill="url(#htxt)" filter="url(#hglow)">MY STATS</text>
</svg>
